<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>WordGuess</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body>
  <div class="app">
    <h1>WordGuess</h1>
    <p class="tagline">Guess the word your partner is hinting at &mdash; in the language you're learning.</p>

    <div id="lobby">
      <div class="panel">
        <label for="name">Your name</label>
        <input type="text" id="name" placeholder="e.g. Alice" maxlength="40" />

        <div class="row">
          <div>
            <label for="native-lang">I'm confident in</label>
            <select id="native-lang">
              <option value="en">English</option>
              <option value="fr">French</option>
              <option value="es">Spanish</option>
              <option value="zh">Chinese</option>
            </select>
          </div>
          <div>
            <label for="target-lang">I'm learning</label>
            <select id="target-lang">
              <option value="fr">French</option>
              <option value="en">English</option>
              <option value="es">Spanish</option>
              <option value="zh">Chinese</option>
            </select>
          </div>
        </div>

        <label for="level">My level in the language I'm learning</label>
        <select id="level">
          <option value="beginner">Beginner</option>
          <option value="intermediate">Intermediate</option>
          <option value="advanced">Advanced</option>
        </select>

        <div class="actions">
          <button id="create-room-btn" class="btn-primary">Create new room</button>
        </div>

        <div class="divider">&mdash; or join a friend's room &mdash;</div>

        <label for="join-code">Room code</label>
        <input type="text" id="join-code" placeholder="ABCD" maxlength="4" value="{{ prefill_code or '' }}" style="text-transform:uppercase" />
        <div class="actions">
          <button id="join-room-btn" class="btn-secondary">Join room</button>
        </div>

        <div id="status-message"></div>
      </div>
    </div>

    <div id="game" class="hidden">
      <div id="room-header">
        <span>Room <span id="room-code-badge"></span></span>
        <span id="round-timer"></span>
        <div id="scoreboard"></div>
      </div>

      <div id="role-banner"></div>

      <div id="word-card" class="hidden">
        <div id="secret-word"></div>
        <div class="warning">Give hints without ever saying this word (or its translation)!</div>
        <div id="guesses-remaining"></div>
      </div>
      <div id="guesser-status" class="hidden">
        <div id="guesses-remaining-guesser" class="tagline"></div>
        <button id="flag-difficult-btn" class="btn-secondary">🤔 This clue is too hard</button>
      </div>

      <div id="chat-log"></div>

      <div id="composer">
        <input type="text" id="chat-input" placeholder="" autocomplete="off" />
        <button id="send-btn" class="btn-primary">Send</button>
      </div>
    </div>
  </div>

  <script src="{{ url_for('static', filename='js/socket.io.min.js') }}"></script>
  <script src="{{ url_for('static', filename='js/game.js') }}"></script>
</body>
</html>
